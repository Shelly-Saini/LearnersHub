{% extends "base.html" %}

{% block title %}Chat with {{ partner.username }} - Learners' Hub{% endblock %}

{% block content %}
<div class="chat-container" style="max-width: 800px; margin: 2rem auto;">
    <div class="glass-card" style="padding: 0; overflow: hidden; height: 80vh; display: flex; flex-direction: column;">
        <!-- Chat Header -->
        <div style="padding: 1.5rem; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 1rem;">
            <a href="{{ url_for('messages') }}" style="text-decoration: none; color: var(--text-muted); font-size: 1.2rem;">←</a>
            <div style="width: 35px; height: 35px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white;">
                {{ partner.username[0]|upper }}
            </div>
            <h3 style="margin: 0;">{{ partner.username }}</h3>
        </div>

        <!-- Messages Area -->
        <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem;">
            {% for msg in messages %}
                <div style="max-width: 70%; padding: 1rem 1.5rem; border-radius: 15px; font-size: 0.95rem; 
                            {% if msg.sender_id == current_user.id %}
                                align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 5px;
                            {% else %}
                                align-self: flex-start; background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--glass-border); border-bottom-left-radius: 5px;
                            {% endif %}">
                    {{ msg.content }}
                    <div style="font-size: 0.7rem; margin-top: 0.5rem; text-align: right; opacity: 0.7;">
                        {{ msg.timestamp.strftime('%H:%M') }}
                    </div>
                </div>
            {% endfor %}
        </div>

        <!-- Input Area -->
        <div style="padding: 1.5rem; background: rgba(255,255,255,0.02); border-top: 1px solid var(--glass-border);">
            <form action="{{ url_for('messages') }}" method="POST" style="display: flex; gap: 1rem;">
                <input type="hidden" name="recipient_id" value="{{ partner.id }}">
                <input type="text" name="content" placeholder="Type a message..." required autocomplete="off" style="flex: 1; padding: 1rem; background: var(--bg-dark); color: white; border: 1px solid var(--glass-border); border-radius: 12px; outline: none;">
                <button type="submit" class="btn-primary" style="padding: 0.8rem 2rem;">Send</button>
            </form>
        </div>
    </div>
</div>

<script>
    // Auto scroll to bottom
    const chatMsgs = document.getElementById('chat-messages');
    chatMsgs.scrollTop = chatMsgs.scrollHeight;
</script>
{% endblock %}
